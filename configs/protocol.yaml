version: "1.2-dev"
seed: 20260712

tracks:
  bioasq_end_to_end:
    dataset: mattmorgis/bioasq-12b-rag
    revision: 6d6add1a6ec2090991386b5ae7608b71fd637bc4
    question_config: question-answer-passages
    corpus_config: text-corpus
    dev_split: dev
    locked_split: eval
    role: confirmatory
    primary_comparison: [B3, G2]
  primekgqa_graph_component:
    dataset: PrimeKGQA
    doi: 10.5281/zenodo.13829395
    revision: generated_question_release
    files: [train_call_bioLLM.json, val_call_bioLLM.json, test_call_bioLLM.json]
    expected_release_pairs: 85368
    count_must_be_recomputed_from_files: true
    role: component_confirmatory
    locked_split: test
    primary_metric: answer_set_f1
    report_by_node_count: [2, 3, 4]
  medqa:
    enabled: false
    role: optional_future_work

knowledge_graph:
  dataset: PrimeKG
  doi: 10.7910/DVN/IXA7BM
  revision: "Dataverse datafiles 6180616 and 6180617"
  files:
    edges_sha256: 57c405049d0adb5ee9070d8b3fbb38f55a053b5c8d45b8b5af1ce23ee5d3ad7c
    nodes_sha256: 18ebcf24887e8529b95c7a7c96c81089cc7c5ba22d53a5c05d56480331961af8
  redistribute: false
  primekgqa_rdf_compatibility_gate:
    gold_query_smoke_count: 100
    minimum_executable_rate: 0.99
    mondo_group_resources_filtered: true

generator:
  provider: futureppo_openai_compatible_gateway
  model: deepseek-v3.2
  snapshot: selected_on_frozen_5_question_dev_calibration_2026-07-13
  temperature: 0
  top_p: 1
  max_output_tokens: 512
  retries: 3

judge:
  provider: futureppo_openai_compatible_gateway
  model: cerebras/gpt-oss-120b
  snapshot: verified_available_2026-07-13
  must_differ_from_generator: true
  human_calibration_sample: 100
  validity_weighted_kappa_minimum: 0.60
  correctness_input: [question, reference_answer, candidate_answer]
  faithfulness_input: [candidate_answer, cited_evidence]

text_strategy:
  chunk_candidates:
    - {id: C0, kind: abstract_record}
    - {id: C2, kind: sentence_aware, max_tokens: 256}
  evaluate_chunking_with: [bm25, medcpt]
  query_candidates:
    - {id: Q0, kind: original}
    - {id: Q1, kind: entity_alias_expansion}
    - {id: Q2, kind: multi_query, max_queries: 3, exploratory: true}
  q2_runtime_trigger: frozen_retrieval_confidence_rule
  q2_must_not_use_gold_at_runtime: true
  selected_query_strategy: Q0
  q1_decision: rejected_on_dev_harmed_rate_exceeded_rescued_rate
  q2_status: not_promoted_after_q1_failure
  selected_chunk_strategy: C0
  chunk_selection_rule: C2_must_improve_recall_at_10_for_both_bm25_and_medcpt
  b3_status: frozen_dev_winner
  b3_components: [C0, Q0, bm25_top_50, medcpt_top_50, rrf_60, cross_encoder_pool_30]

graph_strategy:
  bioasq_max_hops: 2
  primekgqa_max_hops: 3
  final_paths: 5
  answer_types: [node, relation]
  primary_metrics: [answer_set_exact_match, answer_set_f1, executable_query_rate, execution_accuracy]
  secondary_metrics: [entity_link_accuracy, relation_accuracy, graph_pattern_overlap]
  sparql_string_exact_match_is_primary: false
  dev_status: frozen_rule_based_v1
  entity_linking: exact_longest_primekg_name_with_type_tiebreak
  relation_canonicalization: frozen_schema_alias_map_v1
  compatibility_mode: normalized_pattern_fallback

evidence_budget:
  total_tokens: 1800
  max_items: 8
  graph_max_tokens: 540
  graph_shortfall: backfill_ranked_text

sampling:
  smoke: 50
  bioasq_dev_cap: 300
  human_random: 100
  human_random_split: eval
  primekgqa_gold_query_smoke: 100

locked_tests:
  bioasq:
    pipelines: [B3, G2]
    executions: 1
    retune_after_access: false
    statistic: paired_question_bootstrap_10000
  primekgqa:
    split: test
    retune_after_access: false
    statistic: paired_question_bootstrap_10000

budget:
  policy: free_tier_first_cache_first
  automatic_paid_fallback: false
  preserve_confirmatory_population: true
  max_core_pipelines: 6
  max_graph_controls: 4

generator_robustness:
  role: exploratory_dev_only
  reuse_cached_evidence: true
  models:
    - deepseek-v3.2
    - qwen3.5-397b-a17b
  selection: frozen_5_question_dev_calibration_then_deepseek_v3_2
