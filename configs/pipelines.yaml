pipelines:
  B0:
    name: Closed-book
    text_retrieval: false
    graph_retrieval: false
  B1:
    name: BM25 RAG
    text_retrieval: bm25
    graph_retrieval: false
  B2:
    name: MedCPT dense RAG
    text_retrieval: medcpt
    graph_retrieval: false
  B3:
    name: Strong Text-RAG
    text_retrieval: bm25_medcpt_rrf
    reranker: medcpt_cross_encoder
    graph_retrieval: false
  G1:
    name: PrimeKG-only
    text_retrieval: false
    graph_retrieval: primekg_paths
  G2:
    name: Text + PrimeKG
    text_retrieval: bm25_medcpt_rrf
    reranker: medcpt_cross_encoder
    graph_retrieval: primekg_paths

defaults:
  bm25_fetch_k: 50
  medcpt_fetch_k: 50
  rrf_k: 60
  rerank_pool_k: 30
  text_final_k: 8
  entity_confidence_threshold: 0.80
  max_seed_entities: 5
  bioasq_graph_hops: 2
  primekgqa_graph_hops: 3
  max_candidates_per_seed: 200
  final_paths: 5
  graph_path_quality_threshold: 0.80
  evidence_total_tokens: 1800
  text_max_items: 8
  hybrid_max_items: 13
  graph_max_items: 5
  graph_max_tokens: 540
  hybrid_actual_budget: match_each_question_B3_whitespace_words
  evidence_ordering: rank_interleave_text_first_v1
  generator: ${MEDICAL_RAG_GENERATOR:-mock}

component_evaluation:
  primekgqa:
    answer_set_metrics: [exact_match, precision, recall, f1]
    query_metrics: [executable_rate, execution_accuracy]
    report_by_node_count: [2, 3, 4]
    exact_sparql_string_match: false
